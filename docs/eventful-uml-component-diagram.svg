<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Eventful UML Component Diagram</title>
  <desc id="desc">UML-style component diagram for the Eventful system showing browser, React frontend, AWS backend, Cognito, PostgreSQL, and Google Calendar.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .zone-title { font: 700 20px Arial, sans-serif; fill: #334155; }
      .component-stereo { font: italic 14px Arial, sans-serif; fill: #475569; }
      .component-name { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .component-sub { font: 15px Arial, sans-serif; fill: #334155; }
      .edge-label { font: 14px Arial, sans-serif; fill: #334155; }
      .actor-label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .actor-sub { font: 14px Arial, sans-serif; fill: #475569; }
      .boundary { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; rx: 16; ry: 16; }
      .component-box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 10; ry: 10; }
      .component-tab { fill: #ffffff; stroke: #0f172a; stroke-width: 1.5; }
      .edge { fill: none; stroke: #1f2937; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-dashed { fill: none; stroke: #1f2937; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .actor { fill: none; stroke: #0f172a; stroke-width: 2.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <text x="800" y="52" text-anchor="middle" class="title">Eventful UML Component Diagram</text>

  <rect x="120" y="100" width="180" height="780" class="boundary"/>
  <text x="210" y="135" text-anchor="middle" class="zone-title">Client</text>

  <rect x="340" y="100" width="360" height="780" class="boundary"/>
  <text x="520" y="135" text-anchor="middle" class="zone-title">Frontend on Vercel</text>

  <rect x="740" y="100" width="420" height="780" class="boundary"/>
  <text x="950" y="135" text-anchor="middle" class="zone-title">AWS Backend</text>

  <rect x="1210" y="100" width="330" height="780" class="boundary"/>
  <text x="1375" y="135" text-anchor="middle" class="zone-title">External Services</text>

  <circle cx="60" cy="255" r="18" class="actor"/>
  <line x1="60" y1="273" x2="60" y2="328" class="actor"/>
  <line x1="30" y1="292" x2="90" y2="292" class="actor"/>
  <line x1="60" y1="328" x2="33" y2="372" class="actor"/>
  <line x1="60" y1="328" x2="87" y2="372" class="actor"/>
  <text x="60" y="405" text-anchor="middle" class="actor-label">Users</text>
  <text x="60" y="429" text-anchor="middle" class="actor-sub">guest</text>
  <text x="60" y="448" text-anchor="middle" class="actor-sub">attendee</text>
  <text x="60" y="467" text-anchor="middle" class="actor-sub">organizer</text>
  <text x="60" y="486" text-anchor="middle" class="actor-sub">admin</text>

  <g transform="translate(150 370)">
    <rect width="120" height="100" class="component-box"/>
    <rect x="120" y="22" width="18" height="16" class="component-tab"/>
    <rect x="120" y="46" width="18" height="16" class="component-tab"/>
    <text x="60" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="60" y="60" text-anchor="middle" class="component-name">Web Browser</text>
  </g>

  <g transform="translate(400 180)">
    <rect width="240" height="110" class="component-box"/>
    <rect x="240" y="24" width="18" height="16" class="component-tab"/>
    <rect x="240" y="48" width="18" height="16" class="component-tab"/>
    <text x="120" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="120" y="60" text-anchor="middle" class="component-name">React SPA</text>
    <text x="120" y="84" text-anchor="middle" class="component-sub">eventsphere-hub</text>
  </g>

  <g transform="translate(400 340)">
    <rect width="240" height="110" class="component-box"/>
    <rect x="240" y="24" width="18" height="16" class="component-tab"/>
    <rect x="240" y="48" width="18" height="16" class="component-tab"/>
    <text x="120" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="120" y="60" text-anchor="middle" class="component-name">App Router</text>
    <text x="120" y="84" text-anchor="middle" class="component-sub">pages and protected routes</text>
  </g>

  <g transform="translate(400 510)">
    <rect width="240" height="110" class="component-box"/>
    <rect x="240" y="24" width="18" height="16" class="component-tab"/>
    <rect x="240" y="48" width="18" height="16" class="component-tab"/>
    <text x="120" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="120" y="60" text-anchor="middle" class="component-name">API Client</text>
    <text x="120" y="84" text-anchor="middle" class="component-sub">auth session and normalization</text>
  </g>

  <g transform="translate(400 680)">
    <rect width="240" height="110" class="component-box"/>
    <rect x="240" y="24" width="18" height="16" class="component-tab"/>
    <rect x="240" y="48" width="18" height="16" class="component-tab"/>
    <text x="120" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="120" y="60" text-anchor="middle" class="component-name">CloudNetworkMonitor</text>
    <text x="120" y="84" text-anchor="middle" class="component-sub">request visibility for demos</text>
  </g>

  <g transform="translate(810 160)">
    <rect width="260" height="100" class="component-box"/>
    <rect x="260" y="20" width="18" height="16" class="component-tab"/>
    <rect x="260" y="44" width="18" height="16" class="component-tab"/>
    <text x="130" y="30" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="130" y="58" text-anchor="middle" class="component-name">API Gateway HTTP API</text>
  </g>

  <g transform="translate(810 320)">
    <rect width="260" height="100" class="component-box"/>
    <rect x="260" y="20" width="18" height="16" class="component-tab"/>
    <rect x="260" y="44" width="18" height="16" class="component-tab"/>
    <text x="130" y="30" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="130" y="58" text-anchor="middle" class="component-name">AWS Lambda + Mangum</text>
  </g>

  <g transform="translate(810 480)">
    <rect width="260" height="100" class="component-box"/>
    <rect x="260" y="20" width="18" height="16" class="component-tab"/>
    <rect x="260" y="44" width="18" height="16" class="component-tab"/>
    <text x="130" y="30" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="130" y="58" text-anchor="middle" class="component-name">FastAPI App</text>
  </g>

  <g transform="translate(780 650)">
    <rect width="310" height="130" class="component-box"/>
    <rect x="310" y="24" width="18" height="16" class="component-tab"/>
    <rect x="310" y="48" width="18" height="16" class="component-tab"/>
    <text x="155" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="155" y="60" text-anchor="middle" class="component-name">Backend Modules</text>
    <text x="155" y="86" text-anchor="middle" class="component-sub">auth, events, users, RSVP, admin</text>
    <text x="155" y="108" text-anchor="middle" class="component-sub">services and role enforcement</text>
  </g>

  <g transform="translate(1260 180)">
    <rect width="220" height="110" class="component-box"/>
    <rect x="220" y="24" width="18" height="16" class="component-tab"/>
    <rect x="220" y="48" width="18" height="16" class="component-tab"/>
    <text x="110" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="110" y="60" text-anchor="middle" class="component-name">AWS Cognito</text>
    <text x="110" y="84" text-anchor="middle" class="component-sub">identity and JWT claims</text>
  </g>

  <g transform="translate(1260 430)">
    <rect width="220" height="110" class="component-box"/>
    <rect x="220" y="24" width="18" height="16" class="component-tab"/>
    <rect x="220" y="48" width="18" height="16" class="component-tab"/>
    <text x="110" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;database&gt;&gt;</text>
    <text x="110" y="60" text-anchor="middle" class="component-name">PostgreSQL</text>
    <text x="110" y="84" text-anchor="middle" class="component-sub">application data store</text>
  </g>

  <g transform="translate(1260 680)">
    <rect width="220" height="110" class="component-box"/>
    <rect x="220" y="24" width="18" height="16" class="component-tab"/>
    <rect x="220" y="48" width="18" height="16" class="component-tab"/>
    <text x="110" y="32" text-anchor="middle" class="component-stereo">&lt;&lt;component&gt;&gt;</text>
    <text x="110" y="60" text-anchor="middle" class="component-name">Google Calendar</text>
    <text x="110" y="84" text-anchor="middle" class="component-sub">opened from generated links</text>
  </g>

  <path d="M 78 330 L 150 420" class="edge"/>
  <text x="104" y="356" class="edge-label">uses</text>

  <path d="M 270 420 L 335 420 L 335 235 L 400 235" class="edge"/>
  <text x="345" y="228" class="edge-label">loads SPA</text>

  <path d="M 520 290 L 520 340" class="edge"/>
  <text x="536" y="324" class="edge-label">renders</text>

  <path d="M 520 450 L 520 510" class="edge"/>
  <text x="536" y="488" class="edge-label">reads and writes session</text>

  <path d="M 520 680 L 520 620" class="edge-dashed"/>
  <text x="536" y="652" class="edge-label">observes request events</text>

  <path d="M 640 565 L 725 565 L 725 210 L 810 210" class="edge-dashed"/>
  <text x="606" y="590" class="edge-label">HTTP via VITE_API_BASE_URL</text>

  <path d="M 940 260 L 940 320" class="edge"/>
  <text x="956" y="302" class="edge-label">invokes</text>

  <path d="M 940 420 L 940 480" class="edge"/>
  <text x="956" y="462" class="edge-label">adapts ASGI</text>

  <path d="M 940 580 L 940 650" class="edge"/>
  <text x="956" y="626" class="edge-label">dispatches</text>

  <path d="M 1090 705 L 1170 705 L 1170 235 L 1260 235" class="edge-dashed"/>
  <text x="1184" y="214" class="edge-label">sign up, login, refresh, logout</text>
  <text x="1184" y="234" class="edge-label">JWT validation and role claims</text>

  <path d="M 1090 745 L 1170 745 L 1170 485 L 1260 485" class="edge-dashed"/>
  <text x="1184" y="464" class="edge-label">users, events, categories, RSVPs</text>
  <text x="1184" y="484" class="edge-label">organizer requests persistence</text>

  <path d="M 270 450 L 300 450 L 300 845 L 1260 845 L 1260 735" class="edge-dashed"/>
  <text x="720" y="838" text-anchor="middle" class="edge-label">opens generated calendar link</text>
</svg>
